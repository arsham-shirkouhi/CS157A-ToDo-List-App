<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow | Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="index.html">
          <span class="brand-mark">TF</span>
          <span class="brand-copy">
            <strong>TaskFlow</strong>
            <small>Simple to-do and notes app</small>
          </span>
        </a>

        <nav class="nav-links">
          <a href="index.html">Home</a>
          <a href="login.html">Log In</a>
          <a class="active" href="signup.html">Sign Up</a>
        </nav>
      </header>

      <main>
        <section class="card form-card">
          <div class="centered">
            <p class="eyebrow">New account</p>
            <h1>Sign Up</h1>
            <p class="muted">Create a simple demo account and continue to the dashboard.</p>
          </div>

          <form id="signupForm" class="stack-fields">
            <label>
              Name
              <input type="text" name="name" placeholder="Your full name" required />
            </label>
            <label>
              Email
              <input type="email" name="email" placeholder="student@example.com" required />
            </label>
            <label>
              Password
              <input type="password" name="password" placeholder="Create password" required />
            </label>
            <label>
              Confirm Password
              <input type="password" name="confirmPassword" placeholder="Confirm password" required />
            </label>
            <button class="primary-button" type="submit">Create Account</button>
          </form>

          <p class="auth-switch centered">Already have an account? <a href="login.html">Log in</a></p>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
